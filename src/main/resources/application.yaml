server:
  port: ${PORT:8081}

spring:
  application:
    name: ai-knowledge-assistant

  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:ai_knowledge_assistant}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:1111}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:5173}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4.1-mini}
  base-url: https://api.openai.com