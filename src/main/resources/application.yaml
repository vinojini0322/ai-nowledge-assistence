spring:
  application:
    name: ai-knowledge-assistant

  datasource:
    url: jdbc:postgresql://localhost:5432/ai_knowledge_assistant
    username: postgres
    password: 1111


  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true

server:
    port: 8081
